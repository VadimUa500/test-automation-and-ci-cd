name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        shell: pwsh
        run: ./scripts/setup.ps1

      - name: Test
        shell: pwsh
        run: ./scripts/test.ps1

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports
          path: |
            reports/
            artifacts/